<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thư Mời Hội Thảo</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EAECE8;color:#2C2C2C;font-size:15px;line-height:1.7}
    .wrap{max-width:680px;margin:32px auto;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.10);border-radius:4px;overflow:hidden}

    /* HEADER */
    .hd{padding:28px 40px 32px;background:#fff}
    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .logo-box{width:40px;height:40px;background:#C8392B;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:5px;line-height:1.2;text-align:center}
    .logo-name{font-weight:700;font-size:13.5px;color:#2C2C2C;line-height:1.4}
    .logo-sub{font-size:11px;color:#888;font-weight:400}
    .date-tag{display:inline-block;background:#1B6B35;color:#fff;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:16px}
    .main-title{font-size:28px;font-weight:800;line-height:1.25;color:#1A1A1A;margin-bottom:20px}
    .main-title span{color:#C8392B}
    .ev-banner{background:#1B6B35;color:#fff;padding:11px 20px;border-radius:6px;display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
    .ev-code{background:rgba(255,255,255,.2);color:#fff;font-weight:800;font-size:11px;padding:3px 10px;border-radius:4px;letter-spacing:.5px;white-space:nowrap}
    .ev-divider{width:1px;height:18px;background:rgba(255,255,255,.3);flex-shrink:0}
    .ev-desc{font-size:13px;opacity:.9}
    .hd-sub{font-size:13.5px;color:#666;margin-bottom:22px;line-height:1.65}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
    .info-item{display:flex;align-items:flex-start;gap:10px}
    .info-icon{width:30px;height:30px;background:#EEF5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;margin-top:2px}
    .info-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#AAA;margin-bottom:2px}
    .info-val{font-size:13px;font-weight:600;line-height:1.4}

    /* SECTIONS */
    .sec{padding:30px 40px;border-top:1px solid #EDEAE5}
    .sec-light{background:#F7F9F7}
    .num-hd{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .num-circle{width:36px;height:36px;background:#1B6B35;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
    .num-title{font-size:15px;font-weight:800;color:#1A1A1A;text-transform:uppercase;letter-spacing:.5px}

    /* LETTER */
    .letter-box{border-left:3px solid #C9A44C;padding:20px 24px;background:#FFFDF8;border-radius:0 6px 6px 0}
    .letter-box p{font-size:14px;line-height:1.8;color:#333;margin-bottom:14px}
    .letter-box p:last-child{margin-bottom:0}

    /* HIGHLIGHT BOX */
    .hl-box{background:#F0F7F1;border:1.5px solid #A8D5B5;border-radius:8px;overflow:hidden;margin-bottom:16px}
    .hl-box-hd{background:#1B6B35;padding:11px 20px;display:flex;align-items:center;gap:12px}
    .hl-box-badge{background:rgba(255,255,255,.2);color:#fff;font-weight:800;font-size:11px;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
    .hl-box-title{color:#fff;font-weight:700;font-size:14px}
    .hl-box-body{padding:20px}
    .hl-box-desc{font-size:13.5px;font-weight:600;color:#555;margin-bottom:16px}
    .hl-box-note{border-left:3px solid #C9A44C;padding:10px 14px;font-size:13px;color:#555;background:#FFFCF0;border-radius:0 4px 4px 0;line-height:1.6}

    /* OBJECTIVES GRID */
    .obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .obj-card{background:#EEF5EE;border-radius:8px;padding:14px 12px;border-left:3px solid #1B6B35}
    .obj-num{font-size:10px;font-weight:700;color:#1B6B35;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px}
    .obj-title{font-size:13.5px;font-weight:700;color:#1A1A1A;margin-bottom:6px}
    .obj-desc{font-size:12px;color:#666;line-height:1.5}

    /* BODY TEXT */
    .bp{font-size:13.5px;color:#444;line-height:1.75;margin-bottom:16px}
    .bp:last-child{margin-bottom:0}
    .hl{color:#1A1A1A;font-weight:700}
    .red{color:#C8392B;font-weight:700}
    .green{color:#1B6B35;font-weight:700}

    /* STRATEGY GRID */
    .strat-box{border:1.5px solid #1B6B35;border-radius:8px;overflow:hidden;margin-bottom:16px}
    .strat-hd{background:#1B6B35;color:#fff;padding:10px 18px;font-size:12.5px;font-weight:700;letter-spacing:.5px}
    .strat-grid{display:grid;grid-template-columns:1fr 1fr}
    .strat-cell{padding:16px 18px;border-right:1px solid #EEF5EE;border-bottom:1px solid #EEF5EE}
    .strat-cell:nth-child(even){border-right:none}
    .strat-cell:nth-last-child(-n+2){border-bottom:none}
    .sc-label{font-size:10.5px;font-weight:700;color:#1B6B35;letter-spacing:.5px;margin-bottom:4px}
    .sc-title{font-size:13px;font-weight:700;color:#2C2C2C;margin-bottom:6px}
    .sc-desc{font-size:12px;color:#666;line-height:1.55}

    /* POLICY GRID */
    .policy-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .policy-card{background:#F5F3F0;border-radius:8px;padding:15px}
    .pc-label{font-size:10.5px;font-weight:700;color:#C8392B;margin-bottom:4px;letter-spacing:.5px}
    .pc-title{font-size:13px;font-weight:700;color:#2C2C2C;margin-bottom:6px}
    .pc-desc{font-size:12px;color:#666;line-height:1.5}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
    .stat-card{border-radius:8px;padding:16px;text-align:center}
    .stat-card.green-c{background:#EEF5EE}
    .stat-card.red-c{background:#FDE8E6}
    .stat-card.gold-c{background:#FFF8E8}
    .stat-num{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px}
    .stat-card.green-c .stat-num{color:#1B6B35}
    .stat-card.red-c .stat-num{color:#C8392B}
    .stat-card.gold-c .stat-num{color:#B8862A}
    .stat-lbl{font-size:10.5px;font-weight:700;color:#999;letter-spacing:.5px;margin-bottom:6px}
    .stat-desc{font-size:11.5px;color:#666;line-height:1.45}

    /* CRITERIA */
    .crit-box{background:#F7F9F7;border-radius:8px;padding:18px 20px}
    .crit-sub{font-size:11px;font-weight:700;color:#1B6B35;letter-spacing:.7px;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D5E8D8}
    .crit-item{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
    .crit-item:last-child{margin-bottom:0}
    .crit-num{width:26px;height:26px;background:#1B6B35;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px}
    .crit-text{font-size:13.5px;color:#333;line-height:1.65}

    /* SCHEDULE */
    .sched-item{border:1px solid #D5E8D8;border-radius:8px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
    .sched-item:hover{box-shadow:0 2px 8px rgba(27,107,53,.12)}
    .sched-item.open{border-color:#1B6B35}
    .sched-hd{display:flex;align-items:center;padding:13px 18px;gap:14px;background:#fff;user-select:none}
    .sched-item.open .sched-hd{background:#F0F7F1}
    .sched-time{font-size:12.5px;font-weight:700;color:#1B6B35;white-space:nowrap;min-width:90px}
    .sched-title{font-size:13.5px;font-weight:600;color:#2C2C2C;flex:1}
    .sched-meta{font-size:12px;color:#999;white-space:nowrap;display:flex;align-items:center;gap:6px}
    .sched-arrow{font-size:11px;color:#1B6B35;display:inline-block;transition:transform .25s ease}
    .sched-item.open .sched-arrow{transform:rotate(180deg)}
    .sched-body{display:none;padding:14px 18px 16px;border-top:1px solid #EEF5EE;font-size:13.5px;color:#555;line-height:1.7;background:#FAFCFA;animation:fadeDown .2s ease}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .sched-item.open .sched-body{display:block}
    .sched-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
    .tag{background:#EEF5EE;color:#1B6B35;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
    .tag.red{background:#FDE8E6;color:#C8392B;font-weight:600}

    /* SPEAKERS */
    .speaker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .speaker-card{background:#F7F9F7;border-radius:8px;padding:16px;display:flex;gap:12px;align-items:flex-start}
    .speaker-avatar{width:44px;height:44px;background:#1B6B35;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0}
    .speaker-name{font-size:13.5px;font-weight:700;color:#1A1A1A;margin-bottom:3px}
    .speaker-role{font-size:12px;color:#666;line-height:1.4}
    .speaker-org{font-size:11px;color:#1B6B35;font-weight:600;margin-top:4px}

    /* COMMIT */
    .commit-box{border:1px solid #D5E8D8;border-radius:8px;padding:20px 24px;background:#fff}
    .commit-label{font-size:11px;font-weight:700;color:#1B6B35;letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px}
    .commit-item{display:flex;gap:12px;margin-bottom:13px;font-size:13.5px;color:#333;line-height:1.65}
    .commit-item:last-child{margin-bottom:0}
    .commit-dot{width:8px;height:8px;background:#1B6B35;border-radius:50%;flex-shrink:0;margin-top:7px}

    /* CTA */
    .cta-sec{background:#1B6B35;padding:44px 40px;text-align:center}
    .cta-title{color:#fff;font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3}
    .cta-badge{color:#F5C842;font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:18px}
    .cta-desc{color:rgba(255,255,255,.84);font-size:14px;margin-bottom:28px;line-height:1.65}
    .cta-btn{display:inline-block;background:#C8392B;color:#fff;font-weight:800;font-size:13.5px;letter-spacing:1.5px;text-transform:uppercase;padding:16px 50px;border-radius:6px;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .2s,transform .1s}
    .cta-btn:hover{background:#A82E22;transform:translateY(-1px)}
    .cta-info{color:rgba(255,255,255,.6);font-size:12px;margin-top:22px;display:flex;justify-content:center;gap:28px;flex-wrap:wrap}

    /* SIGNATURE */
    .sig{padding:28px 40px;background:#fff;border-top:1px solid #EDEAE5}
    .sig-name{font-size:20px;font-weight:800;color:#1B6B35;margin-bottom:4px}
    .sig-role{font-size:13.5px;color:#555;margin-bottom:3px}
    .sig-contact{font-size:13px;color:#999}

    /* FOOTER */
    .footer{background:#F2F5F2;border-top:1px solid #D5E8D8;padding:14px 40px;text-align:center;font-size:11px;color:#AAA;letter-spacing:.6px;text-transform:uppercase}

    /* SEAL */
    .seal-row{display:flex;align-items:center;gap:16px;margin-bottom:22px}
    .seal{width:60px;height:60px;border:2px solid #C8392B;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .seal-inner{text-align:center}
    .seal-star{color:#C8392B;font-size:18px;line-height:1}
    .seal-text{font-size:8px;font-weight:700;color:#C8392B;letter-spacing:.5px;line-height:1.2;text-transform:uppercase}

    @media(max-width:620px){
      .wrap{margin:0;border-radius:0}
      .hd,.sec,.sig,.cta-sec,.footer{padding-left:20px;padding-right:20px}
      .info-grid,.obj-grid,.strat-grid,.policy-grid,.stats-row,.speaker-grid{grid-template-columns:1fr}
      .cta-info{flex-direction:column;gap:6px}
      .main-title{font-size:22px}
      .sched-meta{display:none}
      .ev-divider{display:none}
    }
  </style>
</head>

/* ================================================================
   🔧  RENDER ENGINE — Không cần sửa phần bên dưới
   ================================================================ */

function renderHeader() {
  const {org, event} = DATA;
  return `<div class="hd">
    <div class="seal-row">
      <div class="seal"><div class="seal-inner"><div class="seal-star">★</div><div class="seal-text">CHÍNH PHỦ<br>VIỆT NAM</div></div></div>
      <div>
        <div class="logo-name">${org.name}</div>
        <div class="logo-sub">${org.sub}</div>
      </div>
    </div>
    <div class="date-tag">${event.dateTag}</div>
    <h1 class="main-title">${event.mainTitle}</h1>
    <div class="ev-banner">
      <span class="ev-code">${event.eventCode}</span>
      <div class="ev-divider"></div>
      <span class="ev-desc">${event.eventTagline}</span>
    </div>
    <p class="hd-sub">${event.subtitle}</p>
    <div class="info-grid">
      <div class="info-item"><div class="info-icon">📅</div><div><div class="info-label">Ngày tổ chức</div><div class="info-val">${event.meetingDate}</div></div></div>
      <div class="info-item"><div class="info-icon">🕐</div><div><div class="info-label">Thời gian</div><div class="info-val">${event.time}</div></div></div>
    </div>
    <div class="info-item" style="margin-top:12px">
      <div class="info-icon">📍</div>
      <div><div class="info-label">Địa điểm</div><div class="info-val">${event.location}</div></div>
    </div>
  </div>`;
}

function renderLetter() {
  const {letter} = DATA;
  return `<div class="sec"><div class="letter-box"><p>${letter.greeting}</p>${letter.paragraphs.map(p=>`<p>${p}</p>`).join('')}</div></div>`;
}

function renderNetwork() {
  const {network} = DATA;
  const tiers = network.tiers.map(t=>`
    <div class="obj-card">
      <div class="obj-num">${t.label}</div>
      <div class="obj-title">${t.name}</div>
      <div class="obj-desc">${t.desc}</div>
    </div>`).join('');
  return `<div class="sec sec-light">
    <div class="hl-box">
      <div class="hl-box-hd"><span class="hl-box-badge">${network.code}</span><span class="hl-box-title">${network.title}</span></div>
      <div class="hl-box-body">
        <p class="hl-box-desc">${network.desc}</p>
        <div class="obj-grid">${tiers}</div>
        <div class="hl-box-note">${network.note}</div>
      </div>
    </div>
  </div>`;
}

function renderBlock(b) {
  if (b.type==='p') return `<p class="bp">${b.text}</p>`;
  if (b.type==='strategy') {
    const cells = b.cells.map(c=>`<div class="strat-cell"><div class="sc-label">${c.label}</div><div class="sc-title">${c.title}</div><div class="sc-desc">${c.desc}</div></div>`).join('');
    return `<div class="strat-box"><div class="strat-hd">${b.header}</div><div class="strat-grid">${cells}</div></div>`;
  }
  if (b.type==='policy') {
    const cards = b.cards.map(c=>`<div class="policy-card"><div class="pc-label">${c.label}</div><div class="pc-title">${c.title}</div><div class="pc-desc">${c.desc}</div></div>`).join('');
    return `<div class="policy-grid">${cards}</div>`;
  }
  if (b.type==='stats') {
    const items = b.items.map(s=>`<div class="stat-card ${s.color}"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.label}</div><div class="stat-desc">${s.desc}</div></div>`).join('');
    return `<div class="stats-row">${items}</div>`;
  }
  if (b.type==='criteria') {
    const items = b.items.map((it,i)=>`<div class="crit-item"><div class="crit-num">${i+1}</div><div class="crit-text">${it}</div></div>`).join('');
    return `<div class="crit-box"><div class="crit-sub">${b.subtitle}</div>${items}</div>`;
  }
  return '';
}

function renderSections() {
  return DATA.sections.map(s=>`<div class="sec${s.light?' sec-light':''}">
    <div class="num-hd"><div class="num-circle">${s.num}</div><div class="num-title">${s.title}</div></div>
    ${s.blocks.map(renderBlock).join('')}
  </div>`).join('');
}

function renderSchedule() {
  const {schedule:s} = DATA;
  const items = s.items.map(it=>{
    const tags = it.tags.length ? `<div class="sched-tags">${it.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';
    return `<div class="sched-item${it.open?' open':''}" onclick="toggleSched(this)">
      <div class="sched-hd"><span class="sched-time">${it.time}</span><span class="sched-title">${it.title}</span><span class="sched-meta">${it.meta} <span class="sched-arrow">▼</span></span></div>
      <div class="sched-body">${it.body}${tags}</div>
    </div>`;
  }).join('');
  return `<div class="sec${s.light?' sec-light':''}">
    <div class="num-hd"><div class="num-circle">${s.num}</div><div class="num-title">${s.title}</div></div>
    <p class="bp">${s.intro}</p>${items}
  </div>`;
}

function renderCommitment() {
  const {commitment:c} = DATA;
  const items = c.items.map(it=>`<div class="commit-item"><div class="commit-dot"></div><div>${it}</div></div>`).join('');
  return `<div class="sec${c.light?' sec-light':''}">
    <div class="num-hd"><div class="num-circle">${c.num}</div><div class="num-title">${c.title}</div></div>
    <div class="commit-box"><div class="commit-label">${c.label}</div>${items}</div>
  </div>`;
}

function renderCTA() {
  const {cta} = DATA;
  return `<div class="cta-sec">
    <div class="cta-title">${cta.title}</div>
    <div class="cta-badge">${cta.badge}</div>
    <div class="cta-desc">${cta.desc}</div>
    <a href="${cta.btnLink}" class="cta-btn">${cta.btnText}</a>
    <div class="cta-info">${cta.info.map(i=>`<span>${i}</span>`).join('')}</div>
  </div>`;
}

function renderSignature() {
  const {signature:s} = DATA;
  return `<div class="sig"><div class="sig-name">${s.name}</div><div class="sig-role">${s.role}</div><div class="sig-contact">${s.contact}</div></div>`;
}

document.getElementById('app').innerHTML =
  renderHeader() + renderLetter() + renderNetwork() +
  renderSections() + renderSchedule() + renderCommitment() +
  renderCTA() + renderSignature() +
  `<div class="footer">${DATA.org.address}</div>`;

function toggleSched(item) {
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.sched-item').forEach(el => el.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}
</script>
